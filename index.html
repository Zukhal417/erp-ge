<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="view-transition" content="same-origin">
    <title>POS Dashboard - Pelunasan</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Auth Checker (immediately protects page) -->
    <script src="auth.js"></script>
    <!-- Config Tailwind -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        indigo: {
                            50: '#eef2ff',
                            100: '#e0e7ff',
                            200: '#c7d2fe',
                            300: '#a5b4fc',
                            400: '#818cf8',
                            500: '#6366f1',
                            600: '#4f46e5',
                            700: '#4338ca',
                            800: '#3730a3',
                            900: '#312e81',
                        }
                    }
                }
            }
        }
    </script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Custom CSS -->
    <link rel="stylesheet" href="styles.css">
</head>

<body class="bg-gray-50 text-gray-900 font-sans antialiased min-h-screen">

    <div id="app-container" class="pb-20 no-print">
        <!-- Type Selection Bubbles -->
        <div class="w-full max-w-6xl mx-auto px-4 mt-6 mb-8">
            <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-4 gap-2">
                <h2 class="text-xl font-bold text-gray-800 tracking-tight">Pilih Jenis Transaksi</h2>
                <div id="global-sync-badge"
                    class="flex items-center gap-2 px-3 py-1.5 bg-blue-50 text-blue-700 rounded-full text-xs font-semibold border border-blue-100 shadow-sm">
                    <i data-lucide="loader-2" class="w-3.5 h-3.5 animate-spin"></i>
                    <span id="global-sync-text">Menyinkronkan Data Server...</span>
                </div>
            </div>
            <div id="type-selector-container"
                class="flex flex-wrap gap-3 bg-white p-2 rounded-xl shadow-sm border border-gray-100 w-fit">
                <!-- Buttons injected via JS -->
            </div>
        </div>

        <main class="max-w-6xl mx-auto mt-2 px-4">
            <!-- Notifications -->
            <div id="error-notification"
                class="hidden mb-6 bg-red-50 border-l-4 border-red-500 p-4 rounded-md flex-col gap-2">
                <div class="flex items-center text-red-700 gap-2 font-medium">
                    <i data-lucide="alert-circle" class="w-5 h-5"></i> Error
                </div>
                <p id="error-message" class="text-red-600 ml-7"></p>
            </div>

            <div id="success-notification"
                class="hidden mb-6 bg-green-50 border-l-4 border-green-500 p-4 rounded-md flex-col gap-2">
                <div class="flex items-center text-green-700 gap-2 font-medium">
                    <i data-lucide="check-circle-2" class="w-5 h-5"></i> Berhasil
                </div>
                <p id="success-message" class="text-green-600 ml-7"></p>
            </div>

            <!-- Main Form -->
            <form id="pos-form" class="grid grid-cols-1 md:grid-cols-2 gap-8">

                <!-- LEFT: Member Data -->
                <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-6">
                    <h2 class="text-lg font-bold text-gray-800 mb-6 flex items-center gap-2 border-b pb-3">
                        <span class="bg-blue-100 text-blue-600 p-1.5 rounded-md">👤</span> Data Member
                    </h2>

                    <div class="space-y-5">
                        <!-- Nomor ID -->
                        <div>
                            <label class="block text-sm font-medium text-gray-500 mb-1">Nomor ID</label>
                            <div class="flex gap-2">
                                <div class="relative flex-grow">
                                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                                        <i data-lucide="search" class="w-4 h-4 text-gray-400"></i>
                                    </div>
                                    <input type="text" id="nomorID" name="nomorID"
                                        class="block w-full pl-10 pr-3 py-2 border border-gray-200 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 text-sm transition-all"
                                        placeholder="M-XXXXX" />
                                </div>
                                <button type="button" id="btn-cari-id"
                                    class="bg-indigo-100 text-indigo-700 hover:bg-indigo-200 px-4 py-2 rounded-lg text-sm font-semibold transition-colors flex items-center gap-2">
                                    <i data-lucide="loader-2" class="w-4 h-4 animate-spin hidden"
                                        id="spinner-cari-id"></i>
                                    <span id="text-cari-id">Cari Data</span>
                                </button>
                            </div>
                        </div>

                        <!-- Nama Lengkap -->
                        <div>
                            <label class="block text-sm font-medium text-gray-500 mb-1">Nama Lengkap</label>
                            <div class="flex gap-2">
                                <div class="relative flex-grow">
                                    <input type="text" id="nama" name="nama"
                                        class="block w-full px-3 py-2 border border-gray-200 rounded-lg focus:ring-2 focus:ring-indigo-500 text-sm transition-all bg-white"
                                        placeholder="Nama Lengkap Customer" required />
                                </div>
                                <button type="button" id="btn-cari-nama"
                                    class="bg-indigo-100 text-indigo-700 hover:bg-indigo-200 px-4 py-2 rounded-lg text-sm font-semibold transition-colors flex items-center gap-2">
                                    <i data-lucide="loader-2" class="w-4 h-4 animate-spin hidden"
                                        id="spinner-cari-nama"></i>
                                    <span id="text-cari-nama">Cari Nama</span>
                                </button>
                            </div>
                        </div>

                        <!-- Generated Kode Transaksi -->
                        <div id="kode-transaksi-container"
                            class="bg-indigo-50 border border-indigo-100 p-3 rounded-lg mb-2 mt-2 flex justify-between items-center shadow-inner">
                            <div class="flex flex-col">
                                <span class="text-xs font-bold text-indigo-400 uppercase tracking-widest mb-0.5">Kode
                                    Transaksi (Otomatis)</span>
                                <span id="kode-transaksi-text" class="text-base font-bold text-indigo-900 font-mono">
                                    <span class="text-indigo-300 italic">Menunggu Cari Data...</span>
                                </span>
                            </div>
                            <div class="bg-indigo-100 p-1.5 rounded-md">
                                <i data-lucide="check-circle-2" class="text-indigo-500 w-5 h-5"></i>
                            </div>
                        </div>

                        <!-- Bukti Transfer -->
                        <div id="bukti-transfer-container" class="mt-3 hidden">
                            <p class="text-xs font-semibold text-gray-500 mb-1">Bukti Transfer (Dari Web):</p>
                            <a id="bukti-transfer-link" href="#" target="_blank" rel="noreferrer">
                                <img id="bukti-transfer-img" src="" alt="Bukti Transfer"
                                    class="w-full max-h-48 object-contain rounded-lg border border-gray-200 cursor-pointer hover:opacity-90 transition-opacity bg-gray-50" />
                            </a>
                            <a id="bukti-transfer-text-link" href="#" target="_blank" rel="noreferrer"
                                class="text-xs text-blue-600 hover:underline mt-1 inline-block">
                                📎 Buka Bukti Transfer di Tab Baru
                            </a>
                        </div>
                    </div>

                    <div class="grid grid-cols-2 gap-4 pt-4 mt-2">
                        <div>
                            <label class="block text-sm font-medium text-gray-500 mb-1">Tgl Transfer</label>
                            <input type="date" id="tanggal" name="tanggal"
                                class="block w-full px-3 py-2 border border-gray-200 rounded-lg text-sm bg-gray-50"
                                required />
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-500 mb-1">Jam</label>
                            <input type="time" id="jam" name="jam"
                                class="block w-full px-3 py-2 border border-gray-200 rounded-lg text-sm bg-gray-50" />
                        </div>
                    </div>
                </div>

                <!-- RIGHT: Program Details -->
                <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-6 flex flex-col">
                    <h2 class="text-lg font-bold text-gray-800 mb-6 flex items-center gap-2 border-b pb-3">
                        <span class="bg-purple-100 text-purple-600 p-1.5 rounded-md">📦</span> Rincian Program
                    </h2>

                    <div class="space-y-4 flex-grow">
                        <!-- Status Pelunasan (Only for Pelunasan/Refund) -->
                        <div id="status-pelunasan-container"
                            class="bg-blue-50 border border-blue-100 p-4 rounded-lg hidden">
                            <label class="block text-sm font-bold text-blue-800 mb-1">Status Pelunasan</label>
                            <select id="tipePelunasan" name="tipePelunasan"
                                class="block w-full px-3 py-2 border border-blue-200 rounded-lg text-sm bg-white">
                                <option value="-">-</option>
                                <option value="Lunas">Lunas</option>
                                <option value="Down Payment">Down Payment</option>
                            </select>
                        </div>

                        <div>
                            <label class="block text-sm font-medium text-gray-500 mb-2">Program / Kelas</label>

                            <!-- Selected Programs Pills -->
                            <div id="selected-programs-container" class="flex flex-wrap gap-2 mb-3">
                                <!-- Pills injected via JS -->
                            </div>

                            <!-- Add Program Dropdown -->
                            <div id="add-program-container">
                                <select id="kelasSelect"
                                    class="block w-full px-3 py-2 border border-gray-200 rounded-lg text-sm bg-gray-50 hover:bg-white transition-colors focus:ring-2 focus:ring-indigo-500">
                                    <option value="" disabled selected>+ Tambah Program / Kelas</option>
                                    <!-- Options injected via JS -->
                                </select>
                            </div>
                        </div>

                        <div>
                            <label class="block text-sm font-medium text-gray-500 mb-1">Keterangan (Opsional)</label>
                            <input type="text" id="keterangan" name="keterangan"
                                class="block w-full px-3 py-2 border border-gray-200 rounded-lg text-sm bg-gray-50 focus:ring-2 focus:ring-indigo-500 focus:bg-white transition-colors"
                                placeholder="Catatan tambahan untuk transaksi ini..." />
                        </div>

                        <!-- Merch and Wisata -->
                        <div id="merch-wisata-container" class="grid grid-cols-2 gap-4">
                            <div>
                                <label class="block text-sm font-medium text-gray-500 mb-1">Merchandise</label>
                                <input type="text" id="merch" name="merch"
                                    class="block w-full px-3 py-2 border border-gray-200 rounded-lg text-sm bg-gray-50"
                                    placeholder="Kaos/Buku/dll" />
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-500 mb-1">Wisata</label>
                                <input type="text" id="wisata" name="wisata"
                                    class="block w-full px-3 py-2 border border-gray-200 rounded-lg text-sm bg-gray-50"
                                    placeholder="Bromo/Bali/dll" />
                            </div>
                        </div>

                        <!-- Kalkulasi Biaya Block -->
                        <div class="mt-6 bg-slate-50 border border-slate-200 rounded-xl p-5 shadow-inner">
                            <div class="grid grid-cols-2 gap-x-4 gap-y-5">
                                <div>
                                    <label class="block text-sm font-semibold text-gray-700 mb-1">Total Harga
                                        Lunas</label>
                                    <div class="relative">
                                        <span class="absolute left-3 top-2 text-gray-500 font-medium">Rp</span>
                                        <input type="number" id="lunas" name="lunas"
                                            class="block w-full pl-10 pr-3 py-2 border border-gray-300 rounded-lg text-sm bg-white focus:ring-2 focus:ring-indigo-500 font-medium"
                                            placeholder="0" />
                                    </div>
                                </div>
                                <div>
                                    <label class="block text-sm font-semibold text-gray-700 mb-1">Diskon</label>
                                    <div class="relative">
                                        <span class="absolute left-3 top-2 text-gray-500 font-medium">Rp</span>
                                        <input type="number" id="diskon" name="diskon"
                                            class="block w-full pl-10 pr-3 py-2 border border-gray-300 rounded-lg text-sm bg-white text-red-600 font-medium"
                                            placeholder="0" />
                                    </div>
                                </div>

                                <div class="col-span-2 mt-2">
                                    <div class="flex justify-between items-center mb-2">
                                        <label
                                            class="block text-sm font-bold text-indigo-700 uppercase tracking-wider">Metode
                                            & Payment Saat Ini</label>
                                        <button type="button" id="btn-add-payment"
                                            class="text-xs bg-indigo-50 text-indigo-700 hover:bg-indigo-100 px-2 py-1 rounded font-semibold">
                                            + Tambah Split Payment
                                        </button>
                                    </div>

                                    <div id="payments-container" class="space-y-3">
                                        <!-- Payment rows injected via JS -->
                                    </div>
                                </div>

                                <!-- Total Refund Info (Admin refund inputs) -->
                                <div id="refund-inputs-container"
                                    class="col-span-2 grid-cols-2 gap-4 mt-2 bg-red-50 p-3 rounded-lg border border-red-100 hidden">
                                    <div>
                                        <label class="block text-xs font-semibold text-red-700 mb-1">Total
                                            Refund</label>
                                        <input type="number" id="totalRefund" name="totalRefund"
                                            class="w-full px-2 py-1 rounded border text-sm" />
                                    </div>
                                    <div>
                                        <label class="block text-xs font-semibold text-red-700 mb-1">Payment
                                            Refunded</label>
                                        <input type="number" id="paymentRefund" name="paymentRefund"
                                            class="w-full px-2 py-1 rounded border text-sm" />
                                    </div>
                                </div>

                                <div
                                    class="col-span-2 pt-3 border-t border-slate-200 flex justify-between items-center mt-1">
                                    <span class="text-sm font-medium text-gray-600">Estimasi Sisa Tagihan:</span>
                                    <span id="sisa-tagihan-text" class="text-xl font-bold text-red-500">Rp 0</span>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="mt-8">
                        <button type="submit" id="btn-submit"
                            class="w-full flex items-center justify-center gap-2 py-3.5 px-4 rounded-xl text-white font-bold text-lg shadow-md transition-all bg-indigo-600 hover:bg-indigo-700 hover:shadow-lg hover:-translate-y-0.5">
                            <i data-lucide="check-circle-2" id="icon-submit-idle"></i>
                            <i data-lucide="loader-2" class="animate-spin hidden" id="icon-submit-loading"></i>
                            <span id="text-submit">Submit Transaksi</span>
                        </button>
                    </div>
                </div>
            </form>
        </main>
    </div>

    <!-- INVOICE MODAL -->
    <div id="invoice-modal"
        class="fixed inset-0 z-50 bg-black bg-opacity-50 flex items-center justify-center p-4 hidden no-print">
        <div class="bg-white rounded-lg w-full max-w-3xl max-h-[90vh] overflow-y-auto relative">

            <div class="sticky top-0 bg-white border-b p-4 flex justify-between items-center no-print">
                <h2 class="text-xl font-bold text-gray-800">Preview Invoice</h2>
                <div class="flex gap-3">
                    <button onclick="window.print()"
                        class="px-4 py-2 bg-indigo-600 text-white rounded-md font-medium hover:bg-indigo-700">
                        Cetak / Simpan PDF
                    </button>
                    <button id="btn-close-invoice"
                        class="px-4 py-2 bg-gray-200 text-gray-800 rounded-md font-medium hover:bg-gray-300">
                        Tutup
                    </button>
                </div>
            </div>

            <div class="p-8 print:p-0" id="printable-invoice">
                <!-- INVOICE CONTENT INJECTED VIA JS -->
            </div>
        </div>
    </div>

    <script src="layout.js"></script>
    <script src="app.js"></script>
    <script>
        // Jika dibuka langsung, pakai layout navigasi tanpa redirect.
        if (window.top === window.self) {
            injectLayout("app-container", "index");
        }
        lucide.createIcons();
    </script>
</body>

</html>
