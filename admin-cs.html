<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="view-transition" content="same-origin">
    <title>Kelola CS - Admin POS DM</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        indigo: { 50: '#eef2ff', 100: '#e0e7ff', 200: '#c7d2fe', 300: '#a5b4fc', 400: '#818cf8', 500: '#6366f1', 600: '#4f46e5', 700: '#4338ca', 800: '#3730a3', 900: '#312e81' }
                    }
                }
            }
        }
    </script>
    <!-- Auth Guard -->
    <script src="auth.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="styles.css">
</head>

<body class="bg-gray-50 text-gray-900 font-sans antialiased min-h-screen">

    <div id="app-container" class="w-full max-w-7xl mx-auto px-4 py-8">

        <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-6 gap-4">
            <div>
                <h1 class="text-2xl font-bold text-gray-800 flex items-center gap-2">
                    <i data-lucide="users" class="text-indigo-600"></i>
                    Kelola Pengguna (CS)
                </h1>
                <p class="text-gray-500 text-sm mt-1">Tambah, edit, atau hapus akun Customer Service</p>
            </div>
            <button onclick="fetchUsers()"
                class="flex items-center gap-2 px-4 py-2 bg-white border border-gray-200 rounded-lg text-sm font-medium text-gray-700 hover:bg-gray-50 transition-colors shadow-sm">
                <i data-lucide="refresh-cw" class="w-4 h-4" id="refresh-icon"></i> Refresh Data
            </button>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">

            <!-- FORM TAMBAH/EDIT -->
            <div class="lg:col-span-1">
                <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-6 sticky top-24">
                    <h2
                        class="text-lg font-bold text-gray-800 flex items-center gap-2 mb-5 pb-3 border-b border-gray-100">
                        <i data-lucide="user-plus" class="text-indigo-600 w-5 h-5"></i>
                        <span id="form-title">Tambah Pengguna Baru</span>
                    </h2>

                    <div id="error-alert"
                        class="hidden mb-4 bg-red-50 border-l-4 border-red-500 p-3 rounded text-red-700 text-sm"></div>
                    <div id="success-alert"
                        class="hidden mb-4 bg-green-50 border-l-4 border-green-500 p-3 rounded text-green-700 text-sm">
                    </div>

                    <form id="user-form" class="space-y-4">
                        <input type="hidden" id="edit-id" value="">

                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Username / ID CS</label>
                            <input type="text" id="username" required
                                class="block w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-indigo-500"
                                placeholder="contoh: CS01">
                        </div>

                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
                            <input type="password" id="password"
                                class="block w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-indigo-500"
                                placeholder="Biarkan kosong jika tidak diubah" required>
                            <p class="text-xs text-gray-400 mt-1 italic hidden" id="password-help">Kosongkan jika tidak
                                ingin mengubah password.</p>
                        </div>

                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Role</label>
                            <select id="role"
                                class="block w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-indigo-500">
                                <option value="cs">Customer Service (CS)</option>
                                <option value="admin">Administrator (Admin)</option>
                            </select>
                        </div>

                        <div class="pt-2 flex gap-2">
                            <button type="submit" id="btn-submit"
                                class="flex-1 flex justify-center items-center gap-2 bg-indigo-600 hover:bg-indigo-700 text-white py-2 px-4 rounded-lg text-sm font-semibold transition-colors disabled:opacity-70 disabled:cursor-not-allowed">
                                <i data-lucide="loader-2" class="w-4 h-4 animate-spin hidden" id="spinner-submit"></i>
                                <span id="text-submit">Simpan Pengguna</span>
                            </button>

                            <button type="button" id="btn-cancel"
                                class="hidden px-4 py-2 bg-gray-100 hover:bg-gray-200 text-gray-700 rounded-lg text-sm font-semibold transition-colors">
                                Batal
                            </button>
                        </div>
                    </form>
                </div>
            </div>

            <!-- TABEL PENGGUNA -->
            <div class="lg:col-span-2">
                <div class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">

                    <div class="overflow-x-auto">
                        <table class="w-full text-left text-sm text-gray-600">
                            <thead
                                class="bg-gray-50 text-gray-700 uppercase text-xs font-semibold border-b border-gray-200">
                                <tr>
                                    <th class="px-6 py-4">ID</th>
                                    <th class="px-6 py-4">Username</th>
                                    <th class="px-6 py-4">Role</th>
                                    <th class="px-6 py-4 text-right">Aksi</th>
                                </tr>
                            </thead>
                            <tbody id="users-tbody" class="divide-y divide-gray-100">
                                <!-- Users Injected Here -->
                            </tbody>
                        </table>

                        <div id="loading-state"
                            class="flex flex-col justify-center items-center py-20 text-indigo-500 gap-3">
                            <i data-lucide="loader-2" class="h-8 w-8 animate-spin"></i>
                            <span class="font-medium text-sm">Mengambil Data CS...</span>
                        </div>

                        <div id="empty-state"
                            class="hidden flex-col justify-center items-center py-20 text-gray-400 gap-3">
                            <i data-lucide="users" class="h-12 w-12 text-gray-300"></i>
                            <span class="font-medium">Belum ada pengguna terdaftar.</span>
                        </div>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <!-- Inject JS Logic -->
    <script src="layout.js"></script>
    <script src="admin-cs.js"></script>
    <script>
        if (window.top === window.self) {
            injectLayout("app-container", "admin-cs");
        }
        lucide.createIcons();
    </script>
</body>

</html>
